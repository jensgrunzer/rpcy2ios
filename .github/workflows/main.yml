name: Build iOS Dev IPA
on:
  workflow_dispatch:
    inputs: 
      zip_url:
        description: "URL to the game zip"
        default: ""
        required: true
        type: string

jobs:
  build-ios:
    runs-on: macos-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Setup Ren'Py
        uses: remarkablegames/setup-renpy@v1
        with:
          renios: true

      - name: Download & Extract & Cleanup
        run: |
          wget "${{ inputs.zip_url }}" --no-verbose -O temp.zip

          mkdir -p extract_dir
          unzip -q temp.zip -d extract_dir
          GAME_DIR=$(find extract_dir -type d -name game -print -quit)

          if [ -z "$GAME_DIR" ]; then
            echo "::error::Validation failed: No game folder found!"
            exit 1
          fi

          mkdir -p wdir
          mv "$GAME_DIR" wdir/game

          rm -rf extract_dir temp.zip
    
          find wdir/game -type d -name "cache" -exec rm -rf {} +
          find wdir/game -type d -name "saves" -exec rm -rf {} +
          find wdir/game -name ".DS_Store" -type f -delete

          ls -la wdir
              
      - name: Generate Xcode Project
        run: |

          renpy-launcher ios_create wdir ../ios-build
          
      - name: Build Xcode Project (Unsigned)
        run: |
          cd ../ios-build
          
          XCODEPROJ=$(find . -name "*.xcodeproj" | head -n 1)
          SCHEME=$(xcodebuild -list -project "$XCODEPROJ" -json | jq -r '.project.schemes[0]')
          
          echo "Projekt: $XCODEPROJ"
          echo "Scheme: $SCHEME"
          
          if [ "$SCHEME" = "null" ] || [ -z "$SCHEME" ]; then
            echo "Fehler: Kein Scheme!"
            exit 1
          fi
          
          xcodebuild clean build \
            -project "$XCODEPROJ" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            SYMROOT="$(pwd)/build"
            
      - name: Package to Dev IPA
        run: |
          cd ../ios-build
          
          APP_DIR=$(find build/Release-iphoneos -name "*.app" | head -n 1)
          
          if [ -z "$APP_DIR" ]; then
            echo "Fehler: Keine .app!"
            exit 1
          fi
          
          # Signatur
          codesign -s - -f --deep "$APP_DIR"
          
          
          mkdir -p Payload
          cp -R "$APP_DIR" Payload/
          zip -qr "$GITHUB_WORKSPACE/game.ipa" Payload
          
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: iOS-Dev-IPA
          path: game.ipa
          retention-days: 7
